<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0d0d0d">
<title>Finanças</title>
<link rel="manifest" href="./app.webmanifest">
<link rel="stylesheet" href="./css/estilo.css">
<script src="./vendor/sql-wasm.js"></script>
</head>
<body>

<div class="carregando" id="carregando">
  <div class="girando"></div>
  <p>Abrindo seu banco…</p>
</div>

<div class="app" id="app" hidden>

  <header class="cabecalho">
    <button class="avatar" type="button" id="btn-perfil" aria-label="Perfil">C</button>

    <button class="seletor-mes" type="button" id="btn-mes" aria-haspopup="listbox">
      <span id="mes-nome">Julho</span>
      <span class="seta">▾</span>
    </button>

    <button class="icone-topo" type="button" id="btn-nuvem" aria-label="Backup na nuvem" hidden>
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 10h-1.26A8 8 0 109 20h9a5 5 0 000-10z"/></svg>
    </button>

    <button class="icone-topo" type="button" id="btn-importar" aria-label="Importar fatura ou extrato">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2"/></svg>
    </button>
  </header>

  <main class="conteudo" id="conteudo"></main>

  <nav class="barra" role="tablist" aria-label="Seções">
    <button class="aba" type="button" role="tab" data-tela="principal" aria-selected="true">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 10l9-7 9 7v9a2 2 0 01-2 2h-4v-6H9v6H5a2 2 0 01-2-2z"/></svg>
      <span>Principal</span>
    </button>
    <button class="aba" type="button" role="tab" data-tela="transacoes" aria-selected="false">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>
      <span>Transações</span>
    </button>
    <div class="vao"></div>
    <button class="aba" type="button" role="tab" data-tela="planejamento" aria-selected="false">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5a2 2 0 012-2h9l5 5v11a2 2 0 01-2 2H6a2 2 0 01-2-2z"/><path d="M14 3v6h6"/></svg>
      <span>Planejamento</span>
    </button>
    <button class="aba" type="button" role="tab" data-tela="dashboard" aria-selected="false">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 3v18h18"/><rect x="7" y="10" width="3" height="7"/><rect x="12" y="6" width="3" height="11"/><rect x="17" y="13" width="3" height="4"/></svg>
      <span>Gráficos</span>
    </button>
    <button class="aba" type="button" role="tab" data-tela="mais" aria-selected="false">
      <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="5" cy="12" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="19" cy="12" r="1.6"/></svg>
      <span>Mais</span>
    </button>
  </nav>

  <button class="fab" type="button" id="btn-novo" aria-label="Novo lançamento" aria-expanded="false">
    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
  </button>

  <div class="leque" id="leque" hidden>
    <div class="leque-fundo" data-fechar></div>
    <div class="leque-opcoes">
      <button class="leque-op" type="button" data-tipo="receita">
        <span class="bolha receita"><svg viewBox="0 0 24 24"><path d="M7 17L17 7M17 7h-6M17 7v6"/></svg></span>
        <span>Receita</span>
      </button>
      <button class="leque-op" type="button" data-tipo="despesa_cartao">
        <span class="bolha cartao"><svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg></span>
        <span>Despesa<br>Cartão</span>
      </button>
      <button class="leque-op" type="button" data-tipo="transferencia">
        <span class="bolha transf"><svg viewBox="0 0 24 24"><path d="M4 9h13l-3-3M20 15H7l3 3"/></svg></span>
        <span>Transferência</span>
      </button>
      <button class="leque-op" type="button" data-tipo="despesa">
        <span class="bolha despesa"><svg viewBox="0 0 24 24"><path d="M17 7L7 17M7 17h6M7 17v-6"/></svg></span>
        <span>Despesa</span>
      </button>
      <button class="leque-op" type="button" data-tipo="investimento">
        <span class="bolha invest"><svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 11-9-9v9z"/><path d="M12 3a9 9 0 019 9h-9z"/></svg></span>
        <span>Investimento</span>
      </button>
    </div>
  </div>

</div>

<dialog class="folha" id="folha"></dialog>

<script type="module" src="./js/app.js"></script>
</body>
</html>
